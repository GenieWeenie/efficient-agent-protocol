name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build release artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            requirements.txt

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build distribution
        run: |
          python -m build

      - name: Verify distribution metadata
        run: |
          python -m twine check dist/*

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-testpypi:
    name: Publish to TestPyPI (pre-release tags)
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') && contains(github.ref_name, '-rc')
    permissions:
      id-token: write
      contents: read
    env:
      TEST_PYPI_API_TOKEN: ${{ secrets.TEST_PYPI_API_TOKEN }}

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish package distributions to TestPyPI
        if: env.TEST_PYPI_API_TOKEN != ''
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          password: ${{ env.TEST_PYPI_API_TOKEN }}

  publish-pypi:
    name: Publish to PyPI (stable tags)
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, '-rc')
    permissions:
      id-token: write
      contents: read
    env:
      PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Validate PyPI token configuration
        run: |
          if [ -z "${PYPI_API_TOKEN}" ]; then
            echo "::error title=Missing PYPI_API_TOKEN::Set repository secret PYPI_API_TOKEN to publish stable releases."
            exit 1
          fi

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ env.PYPI_API_TOKEN }}

  verify-pypi-install:
    name: Verify PyPI install smoke (stable tags)
    needs: publish-pypi
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, '-rc')
    permissions:
      contents: read

    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install released package with retry
        env:
          PACKAGE_VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${PACKAGE_VERSION#v}"
          python -m pip install --upgrade pip
          for attempt in {1..8}; do
            if python -m pip install --no-cache-dir "efficient-agent-protocol==${VERSION}"; then
              echo "Installed efficient-agent-protocol==${VERSION} on attempt ${attempt}"
              break
            fi
            if [ "${attempt}" -eq 8 ]; then
              echo "::error title=PyPI install failed::Unable to install efficient-agent-protocol==${VERSION} from PyPI after retries."
              exit 1
            fi
            python -m pip uninstall -y efficient-agent-protocol || true
            echo "Package not yet available on PyPI. Retrying in 15s..."
            sleep 15
          done

      - name: Import smoke
        run: |
          python - <<'PY'
          import eap
          import eap.agent
          import eap.environment
          import eap.protocol
          print("Import smoke passed for released package.")
          PY
