name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  lint-test:
    name: Lint/Test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install ruff pre-commit pip-audit

      - name: Lint (Ruff syntax/runtime checks)
        if: matrix.python-version == '3.11'
        run: |
          ruff check . --select E9,F63,F7,F82

      - name: Type rigor gate (mypy scoped modules)
        if: matrix.python-version == '3.11'
        run: |
          mypy --follow-imports=skip environment/safe_eval.py environment/executor.py eap/runtime/auth_scopes.py eap/runtime/guardrails.py eap/runtime/http_api.py

      - name: Run tests
        if: matrix.python-version != '3.11'
        run: |
          python -m pytest -q

      - name: Run tests with coverage gates
        if: matrix.python-version == '3.11'
        run: |
          python -m pytest -q \
            --cov=protocol \
            --cov=agent \
            --cov=environment \
            --cov=eap \
            --cov-branch \
            --cov-report=term-missing \
            --cov-report=json:coverage.json
          python - <<'PY'
          import json
          import sys
          from pathlib import Path

          totals = json.loads(Path("coverage.json").read_text(encoding="utf-8"))["totals"]
          line_coverage = float(totals["percent_covered"])
          num_branches = int(totals.get("num_branches", 0))
          covered_branches = int(totals.get("covered_branches", 0))
          branch_coverage = 100.0 if num_branches == 0 else (covered_branches / num_branches) * 100.0

          line_threshold = 80.0
          branch_threshold = 65.0
          print(
              f"Coverage gates: line={line_coverage:.2f}% (min {line_threshold:.2f}%), "
              f"branch={branch_coverage:.2f}% (min {branch_threshold:.2f}%)"
          )
          if line_coverage < line_threshold:
              print("Line coverage gate failed.", file=sys.stderr)
              sys.exit(1)
          if branch_coverage < branch_threshold:
              print("Branch coverage gate failed.", file=sys.stderr)
              sys.exit(1)
          PY

      - name: Pre-commit checks
        if: matrix.python-version == '3.11'
        run: |
          pre-commit run --all-files

      - name: Proof sheet contract checks
        if: matrix.python-version == '3.11'
        run: |
          python scripts/verify_proof_sheet.py
          python -m pytest -q \
            tests/contract/test_eap_proof_sheet_contract.py \
            tests/contract/test_readme_conversion_pack_contract.py

      - name: V1 compatibility contract gate
        if: matrix.python-version == '3.11'
        run: |
          python scripts/check_v1_contract.py
          python -m pytest -q \
            tests/contract/test_v1_contract_lock.py \
            tests/unit/test_v1_contract_gate.py

      - name: Upgrade migration verification (v0.1.8 baseline)
        if: matrix.python-version == '3.11'
        run: |
          python scripts/verify_upgrade_from_baseline.py
          python -m pytest -q tests/integration/test_upgrade_from_baseline.py

      - name: Dependency vulnerability audit
        if: matrix.python-version == '3.11'
        run: |
          python -m pip_audit -r requirements.txt

  quickstart-smoke:
    name: Quickstart smoke (py3.11)
    runs-on: ubuntu-latest
    needs: lint-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            requirements.txt

      - name: Run bootstrap quickstart
        run: |
          ./scripts/bootstrap_local.sh \
            --venv-dir .venv-bootstrap \
            --artifact-dir artifacts/bootstrap \
            --db-path artifacts/bootstrap/bootstrap_state.db \
            --env-file .env

      - name: Run doctor diagnostics
        run: |
          .venv-bootstrap/bin/python scripts/eap_doctor.py doctor \
            --env-file .env \
            --skip-connectivity \
            --state-db-path artifacts/bootstrap/doctor_state.db \
            --output-json artifacts/bootstrap/doctor_diagnostics.json

      - name: Upload bootstrap artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bootstrap-smoke
          path: artifacts/bootstrap/
          if-no-files-found: error

  eval-scorecard:
    name: Eval scorecard (py3.11)
    runs-on: ubuntu-latest
    needs: lint-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run evaluation harness and regression gate
        run: |
          python scripts/eval_scorecard.py \
            --output-dir artifacts/eval \
            --threshold-config docs/eval_thresholds.json \
            --baseline docs/eval_baseline.json

      - name: Upload evaluation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-scorecard
          path: artifacts/eval/
          if-no-files-found: error

  competitive-benchmark:
    name: Competitive benchmark (py3.11)
    runs-on: ubuntu-latest
    needs: eval-scorecard

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Download evaluation artifacts
        uses: actions/download-artifact@v4
        with:
          name: eval-scorecard
          path: artifacts/eval

      - name: Run competitive benchmark suite and gate
        run: |
          python scripts/competitive_benchmark_suite.py \
            --output-dir artifacts/competitive_benchmarks \
            --eval-scorecard artifacts/eval/scorecard.json \
            --profiles docs/competitive_reference_profiles.json \
            --threshold-config docs/competitive_thresholds.json

      - name: Upload competitive benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: competitive-benchmark
          path: artifacts/competitive_benchmarks/
          if-no-files-found: error

  soak-chaos-reliability:
    name: Soak + chaos reliability gate (py3.11)
    runs-on: ubuntu-latest
    needs: competitive-benchmark

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run soak + chaos reliability harness and gate
        run: |
          python scripts/soak_chaos_scorecard.py \
            --output-dir artifacts/soak_chaos \
            --threshold-config docs/soak_chaos_thresholds.json \
            --baseline docs/soak_chaos_baseline.json \
            --soak-iterations 60 \
            --soak-chaos-interval 7 \
            --retry-storm-steps 6

      - name: Upload soak + chaos artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: soak-chaos-reliability
          path: artifacts/soak_chaos/
          if-no-files-found: error

  self-hosted-smoke:
    name: Self-hosted stack smoke
    runs-on: ubuntu-latest
    needs: lint-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Start self-hosted stack
        env:
          EAP_RUNTIME_BEARER_TOKEN: ci-self-hosted-token
        run: |
          cat > deploy/self_hosted/.env.ci <<EOF
          EAP_RUNTIME_BEARER_TOKEN=${EAP_RUNTIME_BEARER_TOKEN}
          EAP_RUNTIME_PORT=8080
          EAP_OPERATOR_UI_PORT=8501
          EOF
          docker compose --env-file deploy/self_hosted/.env.ci -f deploy/self_hosted/docker-compose.yml up --build -d

      - name: Run remote runtime smoke with retry
        env:
          EAP_RUNTIME_BEARER_TOKEN: ci-self-hosted-token
        run: |
          mkdir -p artifacts/self_hosted
          success=0
          for attempt in {1..20}; do
            if python scripts/self_hosted_stack_smoke.py \
              --base-url http://127.0.0.1:8080 \
              --bearer-token "${EAP_RUNTIME_BEARER_TOKEN}" \
              --artifact-path artifacts/self_hosted/self_hosted_smoke.json; then
              success=1
              break
            fi
            sleep 3
          done
          if [[ "${success}" -ne 1 ]]; then
            echo "self-hosted smoke did not succeed after retries" >&2
            exit 1
          fi

      - name: Verify operator UI endpoint
        run: |
          curl -fsS http://127.0.0.1:8501/ -o artifacts/self_hosted/operator_ui.html

      - name: Capture compose logs
        if: always()
        run: |
          mkdir -p artifacts/self_hosted
          docker compose --env-file deploy/self_hosted/.env.ci -f deploy/self_hosted/docker-compose.yml logs --no-color > artifacts/self_hosted/compose.log || true

      - name: Stop self-hosted stack
        if: always()
        run: |
          docker compose --env-file deploy/self_hosted/.env.ci -f deploy/self_hosted/docker-compose.yml down -v || true

      - name: Upload self-hosted artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: self-hosted-smoke
          path: artifacts/self_hosted/
          if-no-files-found: error

  build:
    name: Build package (py3.11)
    runs-on: ubuntu-latest
    needs:
      - lint-test
      - quickstart-smoke
      - eval-scorecard
      - competitive-benchmark
      - soak-chaos-reliability
      - self-hosted-smoke

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            requirements.txt

      - name: Install build tool
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
        run: |
          python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
