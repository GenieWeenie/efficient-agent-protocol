name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  lint-test:
    name: Lint/Test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install ruff pre-commit pip-audit

      - name: Lint (Ruff syntax/runtime checks)
        if: matrix.python-version == '3.11'
        run: |
          ruff check . --select E9,F63,F7,F82

      - name: Run tests
        if: matrix.python-version != '3.11'
        run: |
          python -m pytest -q

      - name: Run tests with coverage gates
        if: matrix.python-version == '3.11'
        run: |
          python -m pytest -q \
            --cov=protocol \
            --cov=agent \
            --cov=environment \
            --cov=eap \
            --cov-branch \
            --cov-report=term-missing \
            --cov-report=json:coverage.json
          python - <<'PY'
          import json
          import sys
          from pathlib import Path

          totals = json.loads(Path("coverage.json").read_text(encoding="utf-8"))["totals"]
          line_coverage = float(totals["percent_covered"])
          num_branches = int(totals.get("num_branches", 0))
          covered_branches = int(totals.get("covered_branches", 0))
          branch_coverage = 100.0 if num_branches == 0 else (covered_branches / num_branches) * 100.0

          line_threshold = 80.0
          branch_threshold = 65.0
          print(
              f"Coverage gates: line={line_coverage:.2f}% (min {line_threshold:.2f}%), "
              f"branch={branch_coverage:.2f}% (min {branch_threshold:.2f}%)"
          )
          if line_coverage < line_threshold:
              print("Line coverage gate failed.", file=sys.stderr)
              sys.exit(1)
          if branch_coverage < branch_threshold:
              print("Branch coverage gate failed.", file=sys.stderr)
              sys.exit(1)
          PY

      - name: Pre-commit checks
        if: matrix.python-version == '3.11'
        run: |
          pre-commit run --all-files

      - name: Dependency vulnerability audit
        if: matrix.python-version == '3.11'
        run: |
          python -m pip_audit -r requirements.txt

  quickstart-smoke:
    name: Quickstart smoke (py3.11)
    runs-on: ubuntu-latest
    needs: lint-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            requirements.txt

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Prepare .env
        run: |
          cp .env.example .env

      - name: Run README smoke example
        run: |
          python -m examples.01_minimal

  eval-scorecard:
    name: Eval scorecard (py3.11)
    runs-on: ubuntu-latest
    needs: lint-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run evaluation harness and regression gate
        run: |
          python scripts/eval_scorecard.py \
            --output-dir artifacts/eval \
            --threshold-config docs/eval_thresholds.json \
            --baseline docs/eval_baseline.json

      - name: Upload evaluation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-scorecard
          path: artifacts/eval/
          if-no-files-found: error

  build:
    name: Build package (py3.11)
    runs-on: ubuntu-latest
    needs:
      - lint-test
      - quickstart-smoke
      - eval-scorecard

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            requirements.txt

      - name: Install build tool
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
        run: |
          python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
