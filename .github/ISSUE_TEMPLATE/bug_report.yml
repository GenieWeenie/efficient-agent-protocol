name: Bug report
description: Report a reproducible defect
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Please include concrete reproduction steps and expected vs actual behavior.
  - type: input
    id: summary
    attributes:
      label: Summary
      placeholder: Short description of the problem
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      placeholder: v0.1.3 or commit SHA
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / output
      render: shell
