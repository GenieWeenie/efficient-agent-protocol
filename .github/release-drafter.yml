name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"
change-template: "- $TITLE (#$NUMBER) @$AUTHOR"
change-title-escapes: "\\<*_&"

version-resolver:
  major:
    labels:
      - "major"
  minor:
    labels:
      - "minor"
      - "enhancement"
  patch:
    labels:
      - "patch"
      - "bug"
      - "documentation"
  default: patch

categories:
  - title: "Breaking Changes"
    labels:
      - "major"
  - title: "Features"
    labels:
      - "enhancement"
      - "minor"
  - title: "Fixes"
    labels:
      - "bug"
      - "patch"
  - title: "Documentation"
    labels:
      - "documentation"

template: |
  ## Changes

  $CHANGES

  ## Contributors

  $CONTRIBUTORS
