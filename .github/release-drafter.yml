name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"
change-template: "- $TITLE (#$NUMBER) @$AUTHOR"
change-title-escapes: "\\<*_&"

version-resolver:
  major:
    labels:
      - "major"
  minor:
    labels:
      - "minor"
      - "enhancement"
  patch:
    labels:
      - "patch"
      - "bug"
      - "documentation"
  default: patch

categories:
  - title: "Breaking Changes"
    labels:
      - "major"
  - title: "Added"
    labels:
      - "enhancement"
      - "minor"
  - title: "Fixed"
    labels:
      - "bug"
  - title: "Documentation"
    labels:
      - "documentation"
      - "patch"

template: |
  ## Added

  $CHANGES

  ## Changed

  _No changes._

  ## Fixed

  _No fixes._

  ## Deprecated

  _None._

  ## Removed

  _None._

  ## Breaking Changes

  _None._

  ## Upgrade Notes

  _See `docs/upgrade_notes_v1.md` for migration guidance._

  ## Contributors

  $CONTRIBUTORS
